name: "🐛 Bug report / 问题反馈"
description: "Something broken in the mod, Viewer, or CLI. / 模组、查看器或命令行工具出了问题。"
title: "[Bug] "
labels: ["bug"]
body:
  - type: dropdown
    id: component
    attributes:
      label: "Component / 出问题的部分"
      options:
        - "In-game mod (export) / 游戏内模组（导出）"
        - "Viewer / 查看器"
        - "CLI / 命令行"
        - "Map layout quality / 排图效果"
        - "Not sure / 不确定"
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: "Version / 版本"
      description: "Shown in the Viewer title bar and on the Paradox Mods page. / 见查看器标题栏或 Paradox Mods 页面。"
      placeholder: "v0.1.0-beta.4"
    validations:
      required: true
  - type: textarea
    id: what-happened
    attributes:
      label: "What happened, and what did you expect? / 发生了什么，期望是什么？"
    validations:
      required: true
  - type: textarea
    id: files
    attributes:
      label: "Logs and files / 日志与文件"
      description: |
        Drag files into this box (ZIP anything GitHub rejects). The right file depends on the component:
        把文件拖进这个框（GitHub 不收的格式请打 ZIP）。按出问题的部分附上：
        - In-game mod / 模组: `%USERPROFILE%\AppData\LocalLow\Colossal Order\Cities Skylines II\Logs\CS2_Metro.Mod.log` + `metro-export-diagnostics.txt`
        - Viewer / CLI: the input metro-export.json (zipped) and the saved SVG/PNG if relevant / 输入的导出文件（ZIP）和有问题的输出图
        - Layout quality / 排图: a screenshot marking what looks wrong / 标注问题位置的截图
