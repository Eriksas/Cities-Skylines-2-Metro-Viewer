name: CI

on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master

jobs:
  build-test:
    name: Build and test
    runs-on: windows-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Run preflight
        shell: pwsh
        run: ./scripts/preflight.ps1 -Configuration Debug

      - name: Publish Viewer smoke package
        shell: pwsh
        run: >-
          dotnet publish src/MetroDiagram.Viewer/MetroDiagram.Viewer.csproj
          -c Release
          --no-restore
          -o artifacts/ci-viewer
